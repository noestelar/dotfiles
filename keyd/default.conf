[ids]
*

[main]
# Cmd (Meta) held with another key → acts as Ctrl
# Cmd (Meta) tapped alone → Meta (KRunner / app launcher)
leftmeta = overload(mac, leftmeta)
rightmeta = overload(mac, rightmeta)

[mac:C]
# Default: Cmd+key → Ctrl+key
# (Covers: Cmd+C/V/X/Z/A/S/W/T/N/F/R/L/P and everything else)

# --- App switching (Mac-style) ---
tab = A-tab                    # Cmd+Tab → Alt+Tab (app switcher)
` = A-`                        # Cmd+` → Alt+` (cycle windows of same app)

# --- Text navigation (Mac-style) ---
left = home                    # Cmd+← → Home (start of line)
right = end                    # Cmd+→ → End (end of line)
up = C-home                    # Cmd+↑ → Ctrl+Home (start of document)
down = C-end                   # Cmd+↓ → Ctrl+End (end of document)
